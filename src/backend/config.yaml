server:
  port: 8080
  mode: debug

database:
  host: localhost
  port: 5432
  user: oen_user
  password: oen_password
  dbname: oen_db
  sslmode: disable
  max_idle_conns: 10
  max_open_conns: 100

cors:
  allow_origins:
    - http://localhost:3000
    - http://localhost:5173
  allow_methods:
    - GET
    - POST
    - PUT
    - DELETE
    - OPTIONS
  allow_headers:
    - Content-Type
    - Authorization
  allow_credentials: true
  max_age: 86400

log:
  level: info
  format: console
